<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter — Geopolo</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  max-width: 420px;
  width: 100%;
  padding: 40px 30px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
}

h1 {
  font-size: 1.9rem;
  margin-bottom: 10px;
  color: #fbbf24;
  letter-spacing: 1px;
}

p {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.65);
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 13px;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 0.9rem;
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

button {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #fbbf24, #d4a843);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  color: #111827;
  cursor: pointer;
  transition: all 0.25s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(251,191,36,0.4);
}

#msg {
  margin-top: 15px;
  font-size: 0.85rem;
  color: #cbd5f5;
}
</style>
</head>

<body>

<div class="box">
  <h1>📡 Briefing Confidentiel</h1>
  <p>Recevez des analyses géopolitiques exclusives directement dans votre boîte mail</p>

  <form onsubmit="return sendEmail(this)">
    <input type="email" placeholder="Votre email" required>
    <button type="submit">S’abonner</button>
  </form>

  <p id="msg"></p>
</div>

<script>
function sendEmail(form) {

  const input = form.querySelector("input");
  const btn = form.querySelector("button");
  const msg = document.getElementById("msg");

  btn.innerText = "⏳ Envoi...";
  btn.disabled = true;

  fetch("https://floral-math-8fc3.nasseralsabri.workers.dev/subscribe", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: input.value,
      lang: "fr"
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      msg.innerText = "✅ Inscription réussie";
      input.value = "";
      btn.innerText = "✓ Inscrit";
    } else {
      msg.innerText = "⚠️ " + data.error;
      btn.disabled = false;
      btn.innerText = "S’abonner";
    }
  })
  .catch(() => {
    msg.innerText = "❌ Erreur de connexion";
    btn.disabled = false;
    btn.innerText = "S’abonner";
  });

  return false;
}
</script>

</body>
</html>
