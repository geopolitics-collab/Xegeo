<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }

        .email {
            margin: 15px 0;
            opacity: 0.9;
        }

        a.button {
            display: inline-block;
            padding: 12px 20px;
            background: #4f8cff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a.button:hover {
            background: #2f6fff;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Contact 📧</h1>
    <p>Vous pouvez me contacter ici :</p>

    <div class="email">geopolo@geopolo.com</div>

    <a class="button" href="mailto:geopolo@geopolo.com">
        Envoyer un email
    </a>

    <div class="footer">
        Réponse rapide 🚀
    </div>
</div>

</body>
</html>
